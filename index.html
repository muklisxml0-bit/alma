<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Aini Dzuriyati Salma 🤍</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
    font-family: 'Courier New', monospace;
    overflow:hidden;
    text-align:center;
    color:white;
}

#opening{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
    z-index:10;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ee9ca7;
    font-size:18px;
    cursor:pointer;
}

#content{
    padding:40px;
    opacity:0;
    transition:1s;
}

.heart{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="opening">
    <h2>Untuk Orang Tersayang 🤍</h2>
    <button onclick="start()">Klik Disini Sayang</button>
</div>

<div id="content">
    <h1>Selamat Ulang Tahun Sayangku 🤍</h1>
    <p id="text"></p>
</div>

<audio id="music" src="ssstik.io_1772462398018-1.mp3" loop></audio>

<script>
let message = `Selamat ulang tahun ya sayangku, barakallah fii umrik 🤍

Selamat ulang tahun yang ke 23 tahun cinta kecilku.

Semoga satu persatu keinginanmu Allah kabulkan.
Semoga semua lelahmu diganti dengan kebahagiaan.
Semoga langkahmu selalu dimudahkan.

Aku bangga kenal kamu.
Aku bangga punya kamu.

Kamu wanita yang kuat.
Aku tau kamu pasti capek banget jalanin hidup ini.
Tapi lihat... kamu sudah sampai sejauh ini.

Bukan cuma aku yang bangga.
Ayah, ibu, mbak, dan adik kamu juga pasti bangga banget sama kamu.

Kamu itu cahaya.
Cahaya yang menyinari mereka.
Cahaya yang menyinari hidupku juga.

Terima kasih sudah bertahan.
Terima kasih sudah jadi kamu.
Terima kasih sudah hadir di hidupku.

Rizki rebian hingga tua bersama 🤍
Aku mencintaimu, hari ini, besok, dan selamanya.`;

let i = 0;

function start(){
    document.getElementById("opening").style.display="none";
    document.getElementById("content").style.opacity="1";

    let audio = document.getElementById("music");
    audio.play().catch(function(error){
        console.log("Autoplay diblokir:", error);
    });

    typeWriter();
}

function typeWriter(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter,50);
    }
}

function createHeart(){
    const heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="🤍";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,500);
</script>

</body>
</html>
